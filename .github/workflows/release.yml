name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run release validation and package publish dry-run.
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  package-release:
    uses: brasalabs6/github-playbook/.github/workflows/npm-package-release.yml@main
    with:
      node_version: "22"
      pnpm_version: "10.21.0"
      registry_url: "https://npm.brasaai.com.br/"
      validation_command: "pnpm check:release"
      dry_run_command: ""
      publish_command: "pnpm release:publish"
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
    secrets: inherit
