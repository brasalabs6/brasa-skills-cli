name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run release validation and package publish dry-run.
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  package-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release tag shape
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag '${GITHUB_REF_NAME}' must match vX.Y.Z or vX.Y.Z-prerelease." >&2
            exit 1
          fi

      - name: Validate tag belongs to default branch
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${DEFAULT_BRANCH}" --depth=1
          git merge-base --is-ancestor "${GITHUB_SHA}" "origin/${DEFAULT_BRANCH}" || {
            echo "Release tag ${GITHUB_REF_NAME} must point at a commit on ${DEFAULT_BRANCH}." >&2
            exit 1
          }

      - name: Validate tag matches package version
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          TAG_VERSION: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const tagVersion = process.env.TAG_VERSION.replace(/^v/, "");
          const manifest = JSON.parse(readFileSync("package.json", "utf8"));
          console.log(`${manifest.name}@${manifest.version} (package.json)`);
          if (manifest.version !== tagVersion) {
            throw new Error(`${manifest.name}@${manifest.version} does not match release tag v${tagVersion}.`);
          }
          NODE

      - uses: pnpm/action-setup@v5
        with:
          version: "10.21.0"
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Configure npm registry
        env:
          REGISTRY_URL: "https://registry.npmjs.org/"
          NODE_AUTH_TOKEN: ${{ secrets.BRASALABS_NPM_TOKEN || secrets.NPM_TOKEN }}
          NPM_PUBLISH_ACCESS: "public"
        shell: bash
        run: |
          set -euo pipefail
          registry_url="${REGISTRY_URL%/}/"
          registry_host="${registry_url#https://}"
          registry_host="${registry_host#http://}"
          registry_host="${registry_host%/}"
          npmrc="${RUNNER_TEMP}/brasalabs-npmrc"
          {
            printf 'registry=%s\n' "${registry_url}"
            printf '@brasalabs:registry=%s\n' "${registry_url}"
            if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
              printf '//%s/:_authToken=%s\n' "${registry_host}" "${NODE_AUTH_TOKEN}"
              printf '//%s/:always-auth=true\n' "${registry_host}"
            fi
          } > "${npmrc}"
          echo "NPM_CONFIG_USERCONFIG=${npmrc}" >> "${GITHUB_ENV}"
          echo "BRASALABS_NPM_REGISTRY=${registry_url}" >> "${GITHUB_ENV}"
          echo "NPM_PUBLISH_ACCESS=${NPM_PUBLISH_ACCESS}" >> "${GITHUB_ENV}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate package
        run: pnpm check && npm pack --dry-run && pnpm release:dry-run

      - name: Require npm auth for publish
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.BRASALABS_NPM_TOKEN || secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "BRASALABS_NPM_TOKEN or NPM_TOKEN is required for public npm publish." >&2
            exit 1
          fi

      - name: Publish package
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.BRASALABS_NPM_TOKEN || secrets.NPM_TOKEN }}
          NPM_PUBLISH_ACCESS: "public"
        run: pnpm release:publish
