name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  package-ci:
    uses: brasalabs6/github-playbook/.github/workflows/npm-package-ci.yml@main
    with:
      node_version: "22"
      pnpm_version: "10.21.0"
      validation_command: "pnpm check"
    secrets: inherit
